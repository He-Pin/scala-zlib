name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  # ─── Format check ─────────────────────────────────────────────────────────
  format-check:
    name: Check formatting (scalafmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            out/
          key: mill-fmt-${{ runner.os }}-${{ hashFiles('build.sc', '.mill-version') }}
      - name: Check scalafmt
        run: ./mill mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll __.sources

  # ─── JVM compile + test ────────────────────────────────────────────────────
  test-jvm:
    name: Test JVM (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    needs: format-check
    strategy:
      matrix:
        java-version: ["17", "21", "25"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            out/
          key: mill-jvm-${{ runner.os }}-java${{ matrix.java-version }}-${{ hashFiles('build.sc', '.mill-version') }}
      - name: Test core + jvm
        run: ./mill core[2.13.16].test + core[3.3.7].test + jvm[2.13.16].test + jvm[3.3.7].test

  # ─── Scala.js test ─────────────────────────────────────────────────────────
  test-js:
    name: Test Scala.js
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            out/
          key: mill-js-${{ runner.os }}-${{ hashFiles('build.sc', '.mill-version') }}
      - name: Test coreJS
        run: ./mill coreJS[2.13.16].test + coreJS[3.3.7].test

  # ─── Scala Native test ─────────────────────────────────────────────────────
  test-native:
    name: Test Scala Native
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Clang / LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libstdc++-12-dev zlib1g-dev
      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            out/
          key: mill-native-${{ runner.os }}-${{ hashFiles('build.sc', '.mill-version') }}
      - name: Test coreNative
        run: ./mill coreNative[2.13.16].test + coreNative[3.3.7].test

  # ─── WASM test ──────────────────────────────────────────────────────────────
  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            out/
          key: mill-wasm-${{ runner.os }}-${{ hashFiles('build.sc', '.mill-version') }}
      - name: Test coreWASM
        run: ./mill coreWASM[2.13.16].test + coreWASM[3.3.7].test

  # ─── Benchmark (compile only) ──────────────────────────────────────────────
  benchmark:
    name: Benchmark (compile)
    runs-on: ubuntu-latest
    needs: format-check
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            out/
          key: mill-bench-${{ runner.os }}-${{ hashFiles('build.sc', '.mill-version') }}
      - name: Compile benchmarks
        run: ./mill bench.compile
