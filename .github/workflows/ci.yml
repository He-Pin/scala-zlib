name: CI

on:
  push:
    branches: ["master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Format check ─────────────────────────────────────────────────────────
  format-check:
    name: Check formatting (scalafmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache Mill & Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
            out/
          key: mill-21-${{ runner.os }}-fmt-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: |
            mill-21-${{ runner.os }}-fmt-
            mill-21-${{ runner.os }}-
      - name: Check scalafmt
        run: ./mill mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll __.sources

  # ─── JVM compile + test ────────────────────────────────────────────────────
  test-jvm:
    name: Test JVM (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: format-check
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21', '25']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Cache Mill & Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
            out/
          key: mill-${{ matrix.java }}-${{ runner.os }}-jvm-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: |
            mill-${{ matrix.java }}-${{ runner.os }}-jvm-
            mill-${{ matrix.java }}-${{ runner.os }}-
      - name: Test JVM (Scala 2.13 + 3.3)
        run: |
          ./mill core[2.13.16].test
          ./mill core[3.3.7].test
          ./mill jvm[2.13.16].test
          ./mill jvm[3.3.7].test

  # ─── Scala.js test ─────────────────────────────────────────────────────────
  test-js:
    name: Test Scala.js
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache Mill & Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
            out/
          key: mill-21-${{ runner.os }}-js-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: |
            mill-21-${{ runner.os }}-js-
            mill-21-${{ runner.os }}-
      - name: Test coreJS
        run: ./mill coreJS[2.13.16].test + coreJS[3.3.7].test

  # ─── Scala Native test ─────────────────────────────────────────────────────
  test-native:
    name: Test Scala Native
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Clang / LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libstdc++-12-dev zlib1g-dev
      - name: Cache Mill & Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
            out/
          key: mill-21-${{ runner.os }}-native-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: |
            mill-21-${{ runner.os }}-native-
            mill-21-${{ runner.os }}-
      - name: Test coreNative
        run: ./mill coreNative[2.13.16].test + coreNative[3.3.7].test

  # ─── Scala Native test (Windows) ──────────────────────────────────────────
  test-native-windows:
    name: Test Scala Native (Windows)
    runs-on: windows-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache Mill & Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
            out/
          key: mill-21-${{ runner.os }}-native-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: |
            mill-21-${{ runner.os }}-native-
            mill-21-${{ runner.os }}-
      - name: Test coreNative (Windows)
        shell: bash
        run: |
          export PATH="/c/Program Files/LLVM/bin:$PATH"
          ./mill.bat coreNative[2.13.16].test
          ./mill.bat coreNative[3.3.7].test

  # ─── WASM test ──────────────────────────────────────────────────────────────
  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache Mill & Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
            out/
          key: mill-21-${{ runner.os }}-wasm-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: |
            mill-21-${{ runner.os }}-wasm-
            mill-21-${{ runner.os }}-
      - name: Test coreWASM
        run: ./mill coreWASM[2.13.16].test + coreWASM[3.3.7].test

  # ─── CLI tools (compile only) ────────────────────────────────────────────────
  test-cli:
    name: Compile CLI tools
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache Mill & Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
            out/
          key: mill-21-${{ runner.os }}-cli-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: mill-21-${{ runner.os }}-cli-
      - name: Compile CLI tools
        run: ./mill gzip.compile + gunzip.compile + pigz.compile

  # ─── Benchmark (compile only) ──────────────────────────────────────────────
  benchmark:
    name: Benchmark (compile)
    runs-on: ubuntu-latest
    needs: format-check
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache Mill & Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
            out/
          key: mill-21-${{ runner.os }}-bench-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: |
            mill-21-${{ runner.os }}-bench-
            mill-21-${{ runner.os }}-
      - name: Compile benchmarks
        run: ./mill bench.compile
